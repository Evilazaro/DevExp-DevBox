# yaml-language-server: $schema=./azureResources.schema.json
#
# =============================================================================
# Azure Resources Configuration
# =============================================================================
#
# Description:
#   This configuration file defines the Azure resource group organization for
#   the DevExp-DevBox project. It provides a structured approach to organizing
#   cloud resources into logical groups based on their function.
#
# Resource Groups:
#   - Workload:   Core application and compute resources (VMs, storage, apps)
#   - Security:   Security-related resources (Key Vaults, NSGs, Defender)
#   - Monitoring: Observability and logging resources (Log Analytics, App Insights)
#
# Configuration Properties:
#   - create:      Boolean flag to enable/disable resource group creation
#   - name:        Azure resource group name (must be unique within subscription)
#   - description: Brief description of the resource group's purpose
#   - tags:        Azure resource tags for organization, billing, and governance
#
# Tags Schema:
#   - environment:  Deployment environment (dev, test, prod)
#   - division:     Business division responsible for the resource
#   - team:         Team owning and managing the resource
#   - project:      Associated project name
#   - costCenter:   Financial allocation center for billing
#   - owner:        Resource owner for accountability
#   - landingZone:  Azure landing zone classification
#   - resources:    Resource type identifier
#
# Usage:
#   This file is consumed by Azure Bicep templates during infrastructure
#   deployment to create and configure the defined resource groups.
#
# =============================================================================

# =============================================================================
# Workload Resource Group
# =============================================================================
# Core workload resources including compute, storage, and application services
workload:
  create: true
  name: devexp-workload
  description: prodExp
  tags:
    environment: dev # Deployment environment (dev, test, prod)
    division: Platforms # Business division responsible for the resource
    team: DevExP # Team owning the resource
    project: Contoso-DevExp-DevBox # Project name
    costCenter: IT # Financial allocation center
    owner: Contoso # Resource owner
    landingZone: Workload # Landing zone classification
    resources: ResourceGroup # Resource type

# =============================================================================
# Security Resource Group
# =============================================================================
# Security-related resources (Key Vaults, NSGs, Defender, etc.)
security:
  create: true
  name: devexp-security
  description: prodExp
  tags:
    environment: dev # Deployment environment
    division: Platforms # Business division
    team: DevExP # Team
    project: Contoso-DevExp-DevBox # Project name
    costCenter: IT # Cost center
    owner: Contoso # Owner
    landingZone: Workload # Landing zone
    resources: ResourceGroup # Resource type

# =============================================================================
# Monitoring Resource Group
# =============================================================================
# Monitoring and observability resources
monitoring:
  create: true
  name: devexp-monitoring
  description: prodExp
  tags:
    environment: dev # Deployment environment
    division: Platforms # Business division
    team: DevExP # Team
    project: Contoso-DevExp-DevBox # Project name
    costCenter: IT # Cost center
    owner: Contoso # Owner
    landingZone: Workload # Landing zone
    resources: ResourceGroup # Resource type
