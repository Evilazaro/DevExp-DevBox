# yaml-language-server: $schema=./security.schema.json

# =============================================================================
# Security Configuration File
# =============================================================================
#
# This file defines the security infrastructure settings for the DevExp-DevBox
# project. It configures Azure Key Vault resources for secure secret management.
#
# Key Vault Overview:
#   Azure Key Vault is a cloud service for securely storing and accessing secrets,
#   keys, and certificates. This configuration enables:
#   - Centralized secret management for development environments
#   - GitHub Actions token storage for CI/CD pipelines
#   - RBAC-based access control for enhanced security
#
# Configuration Sections:
#   - create: Boolean flag to enable/disable Key Vault provisioning
#   - keyVault: Main configuration block containing:
#       - Basic settings (name, description, secretName)
#       - Security settings (purge protection, soft delete, RBAC)
#       - Resource organization tags for Azure governance
#
# Usage:
#   This configuration is consumed by the infrastructure deployment scripts
#   to provision and configure the Azure Key Vault resource.
#
# Related Files:
#   - security.schema.json: JSON schema for validation
#
# Repository: Evilazaro/DevExp-DevBox
# Branch: docs/refacto
#
# =============================================================================

create: true

# Key Vault configuration block
keyVault:
  # Basic settings
  name: contoso # Globally unique Key Vault name
  description: Development Environment Key Vault # Purpose of this Key Vault
  secretName: gha-token # Name of the GitHub Actions token secret

  # Security settings
  enablePurgeProtection: true # Prevent permanent deletion of secrets
  enableSoftDelete: true # Allow recovery of deleted secrets within retention period
  softDeleteRetentionInDays: 7 # Retention period for deleted secrets (7-90 days)
  enableRbacAuthorization: true # Use Azure RBAC for access control

  # Resource organization tags
  tags:
    environment: dev # Deployment environment (dev/test/staging/prod)
    division: Platforms # Organizational division
    team: DevExP # Owning team
    project: Contoso-DevExp-DevBox # Associated project
    costCenter: IT # Cost center for billing
    owner: Contoso # Resource owner
    landingZone: security # Azure landing zone classification
    resources: ResourceGroup # Resource grouping identifier
