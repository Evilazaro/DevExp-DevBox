# =============================================================================
# File: release.yml
# Purpose: Branch-based release strategy workflow for Dev Box Accelerator
# Description: Generates semantic versions and publishes GitHub releases based
#              on branch context. Supports both production (main) and pre-release
#              (feature/development) workflows with automatic version calculation.
#
# Triggers: Manual workflow dispatch only
#
# Inputs:
#   - force_release: (boolean) Force create a release even for non-main branches
#
# Jobs:
#   1. generate-release - Calculates semantic version and prepares release metadata
#   2. build - Compiles Bicep templates and creates versioned artifacts
#   3. publish-release - Creates and publishes GitHub Release with artifacts
#   4. summary - Generates workflow execution summary
#
# Outputs:
#   - GitHub Release with compiled ARM templates and deployment files
#   - Semantic version tags following branch-based strategy
#
# Required Permissions:
#   - contents: write (for creating tags and releases)
#   - pull-requests: read (for PR information)
#   - actions: read (for workflow introspection)
#
# Dependencies:
#   - .github/actions/ci/generate-release
#   - .github/actions/ci/bicep-standard-ci
#   - softprops/action-gh-release
# =============================================================================

name: Branch-Based Release Strategy

# Workflow triggers
on:
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force create a release (even for non-main branches)"
        required: false
        default: false
        type: boolean

# Least-privilege permissions
permissions:
  contents: write # Required for creating tags and releases
  pull-requests: read # Required for PR information
  actions: read # Required for workflow introspection

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------------
  # Job: generate-release
  # Purpose: Calculate semantic version and prepare release metadata
  # -----------------------------------------------------------------------------
  generate-release:
    name: Generate Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      new_version: ${{ steps.release.outputs.new_version }}
      release_type: ${{ steps.release.outputs.release_type }}
      previous_tag: ${{ steps.release.outputs.previous_tag }}
      should_release: ${{ steps.release.outputs.should_release }}
      should_publish: ${{ steps.release.outputs.should_publish }}
      branch_name: ${{ steps.release.outputs.branch_name }}
      commit_sha: ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0 # Full history for proper tag analysis

      - name: Generate Release Information
        id: release
        uses: ./.github/actions/ci/generate-release

      - name: Release Strategy Summary
        shell: bash
        run: |
          echo "## 🌟 Release Strategy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔀 Branch | \`${{ steps.release.outputs.branch_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Version | \`${{ steps.release.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Previous | \`${{ steps.release.outputs.previous_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Type | \`${{ steps.release.outputs.release_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # -----------------------------------------------------------------------------
  # Job: build
  # Purpose: Compile Bicep templates and create versioned artifacts
  # -----------------------------------------------------------------------------
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: generate-release
    # Only build if should_release is true and workflow wasn't cancelled
    if: ${{ !cancelled() && needs.generate-release.outputs.should_release == 'true' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Build Bicep Templates
        id: build
        uses: ./.github/actions/ci/bicep-standard-ci
        with:
          branch_name: ${{ needs.generate-release.outputs.branch_name }}
          new_version: ${{ needs.generate-release.outputs.new_version }}
          should_publish: ${{ needs.generate-release.outputs.should_publish }}

      - name: Build Summary
        shell: bash
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 Bicep templates compiled to ARM templates" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Infrastructure deployment files" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Version: \`${{ needs.generate-release.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🔀 Branch: \`${{ needs.generate-release.outputs.branch_name }}\`" >> $GITHUB_STEP_SUMMARY

  # -----------------------------------------------------------------------------
  # Job: publish-release
  # Purpose: Create and publish GitHub Release with artifacts
  # -----------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [generate-release, build]
    # Publish release when: build succeeded AND should_release is true AND (should_publish is true OR force_release input is true)
    # Using !cancelled() to ensure we don't run if workflow was cancelled
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.generate-release.outputs.should_release == 'true' && 
      (needs.generate-release.outputs.should_publish == 'true' || github.event.inputs.force_release == 'true')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: artifacts-${{ needs.generate-release.outputs.new_version }}
          path: ./artifacts

      - name: Generate Release Notes
        id: release_notes
        shell: bash
        run: |
          branch_name="${{ needs.generate-release.outputs.branch_name }}"
          release_type="${{ needs.generate-release.outputs.release_type }}"
          previous_tag="${{ needs.generate-release.outputs.previous_tag }}"
          new_version="${{ needs.generate-release.outputs.new_version }}"
          commit_sha="${{ needs.generate-release.outputs.commit_sha }}"

          # Determine if this is a prerelease
          is_prerelease="false"
          if [[ "$branch_name" != "main" ]] || [[ "$new_version" == *"-"* ]]; then
            is_prerelease="true"
          fi

          # Generate release body
          cat > release_notes.md << EOF
          ## 🌟 Branch-Based Release Strategy

          ### 📊 Release Information
          | Property | Value |
          |----------|-------|
          | 🔀 Branch | \`$branch_name\` |
          | 🏷️ Version | \`$new_version\` |
          | 📦 Previous | \`$previous_tag\` |
          | 🚀 Type | \`$release_type\` |
          | 🤖 Trigger | ${{ github.event_name }} |
          | 📝 Commit | \`$commit_sha\` |

          ### 📦 Artifacts Included
          - 📄 Bicep templates compiled to ARM templates
          - 🏗️ Infrastructure deployment files
          - 📋 Release metadata and documentation

          ### 🔗 Links
          - [Commit History](https://github.com/${{ github.repository }}/commits/$branch_name)
          - [Compare Changes](https://github.com/${{ github.repository }}/compare/$previous_tag...$new_version)
          EOF

          echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ needs.generate-release.outputs.new_version }}
          name: Release ${{ needs.generate-release.outputs.new_version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.release_notes.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        shell: bash
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎉 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.generate-release.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.generate-release.outputs.new_version }})" >> $GITHUB_STEP_SUMMARY

  # 📊 Summary job for workflow status
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [generate-release, build, publish-release]
    # Run on success or failure but not when cancelled
    if: ${{ !cancelled() }}
    steps:
      - name: Workflow Summary
        shell: bash
        run: |
          echo "📊 Workflow Execution Summary"
          echo "================================"
          echo ""
          echo "🔀 Branch: ${{ needs.generate-release.outputs.branch_name || 'N/A' }}"
          echo "🏷️ Version: ${{ needs.generate-release.outputs.new_version || 'N/A' }}"
          echo "🚀 Release Type: ${{ needs.generate-release.outputs.release_type || 'N/A' }}"
          echo "🤖 Trigger: ${{ github.event_name }}"
          echo ""
          echo "📋 Job Status:"
          echo "  - Generate Release: ${{ needs.generate-release.result }}"
          echo "  - Build: ${{ needs.build.result }}"
          echo "  - Publish Release: ${{ needs.publish-release.result }}"
          echo ""
          if [[ "${{ needs.publish-release.result }}" == "success" ]]; then
            echo "✅ Release published successfully!"
          elif [[ "${{ needs.generate-release.outputs.should_publish }}" == "false" ]]; then
            echo "ℹ️  Development build completed. Tag created but no release published."
          else
            echo "⚠️  Workflow completed with issues. Check individual job logs."
          fi
