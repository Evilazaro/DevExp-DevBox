# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
#
# ==============================================================================
# DSC Configuration: Winget Package Upgrade
# ==============================================================================
#
# Description:
#   This DSC (Desired State Configuration) file upgrades all Microsoft Store
#   applications using the Windows Package Manager (winget). It automates the
#   process by downloading and executing a remote PowerShell script that
#   performs the winget upgrade operation.
#
# Author: DevExp-DevBox Team
# Repository: https://github.com/Evilazaro/DevExp-DevBox
#
# ------------------------------------------------------------------------------
# Requirements:
# ------------------------------------------------------------------------------
#   - Windows 10/11 with winget installed
#   - Elevated (administrator) security context
#   - Internet connectivity to download the update script from GitHub
#   - TLS 1.2 support for secure HTTPS download
#
# ------------------------------------------------------------------------------
# Workflow:
# ------------------------------------------------------------------------------
#   1. Sets up error handling and execution policy for the session
#   2. Configures TLS 1.2 protocol for secure communication
#   3. Creates a temporary directory for script download
#   4. Downloads winget-update.ps1 from the repository with retry logic
#      (up to 3 attempts with exponential backoff)
#   5. Validates the downloaded script (existence and non-empty)
#   6. Unblocks the downloaded file for execution
#   7. Executes the script in a hidden PowerShell process
#
# ------------------------------------------------------------------------------
# Notes:
# ------------------------------------------------------------------------------
#   - The TestScript always returns $false to ensure the upgrade runs each time
#   - Script execution uses a hidden window to avoid UI interruption
#   - Failed downloads after 3 attempts will cause the configuration to fail
#
# ==============================================================================

properties:
  configurationVersion: "0.2.0"
  resources:
    - resource: PSDscResources/Script
      id: Winget-Upgrade-Packages
      directives:
        description: Upgrade all Microsoft Store apps using winget
        securityContext: elevated # Requires admin rights to install apps
      settings:
        SetScript: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference    = 'SilentlyContinue'
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force | Out-Null

          $scriptUrl    = 'https://raw.githubusercontent.com/Evilazaro/DevExp-DevBox/main/.configuration/devcenter/workloads/winget-update.ps1'
          $downloadDir  = Join-Path $env:TEMP 'DevExp-DevBox-Setup'
          $localScript  = Join-Path $downloadDir 'winget-update.ps1'

          # Ensure TLS 1.2 for older hosts
          try {
              [System.Net.ServicePointManager]::SecurityProtocol = `
                  [System.Net.ServicePointManager]::SecurityProtocol -bor [System.Net.SecurityProtocolType]::Tls12
          } catch { }

          # Create temp folder if needed
          if (-not (Test-Path -LiteralPath $downloadDir)) {
              New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null
          }

          # Download script quietly (retry up to 3 times)
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                  Invoke-WebRequest -Uri $scriptUrl -OutFile $localScript -UseBasicParsing -TimeoutSec 60 -ErrorAction Stop
                  break
              } catch {
                  if ($attempt -eq $maxAttempts) {
                      Write-Error "Failed to download script after $maxAttempts attempts. $_"
                      exit 1
                  }
                  Start-Sleep -Seconds ([int][Math]::Pow(2, $attempt))
              }
          }

          # Validate and unblock
          if (-not (Test-Path -LiteralPath $localScript) -or (Get-Item -LiteralPath $localScript).Length -le 0) {
              Write-Error "Downloaded script is missing or empty: $localScript"
              exit 1
          }
          try { Unblock-File -LiteralPath $localScript } catch { }

          # Run the script in a separate quiet PowerShell process
          Start-Process powershell.exe -ArgumentList @(
              '-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', $localScript
          ) -WindowStyle Hidden -Wait

        GetScript: return $false
        TestScript: return $false